<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GAB Jewels | Luxury</title>
    <link rel="stylesheet" href="assets/css/index.css">
    <style>
        .auth-overlay {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 8px;
            text-align: center;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        #main-content {
            padding: 50px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="auth-modal" class="auth-overlay">
        <div class="auth-card">
            <h2 id="modal-title">GAB JEWELS</h2>
            <div id="login-view">
                <input type="email" id="l-email" placeholder="Email">
                <input type="password" id="l-pass" placeholder="Password">
                <button onclick="authLogic.login()">Login</button>
                <p onclick="authLogic.showSignup()" style="cursor:pointer; font-size:12px;">New? Sign Up</p>
            </div>
            <div id="signup-view" style="display:none;">
                <input type="email" id="s-email" placeholder="Email">
                <input type="text" id="s-phone" placeholder="Phone (10 digits)">
                <button onclick="authLogic.triggerOTP()">Get OTP</button>
            </div>
            <div id="otp-view" style="display:none;">
                <input type="text" id="otp-code" placeholder="Enter OTP">
                <button onclick="authLogic.verifyOTP()">Verify OTP</button>
            </div>
            <div id="password-view" style="display:none;">
                <input type="password" id="new-password" placeholder="Set Password">
                <button onclick="authLogic.finalizeSignup()">Enter Store</button>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1>Welcome to the Royal Collection</h1>
        <button onclick="localStorage.removeItem('isLoggedIn'); location.reload();">Logout</button>
    </div>

    <!-- Replace this -->
    <script src="assets/js/auth.js"></script>
    <script>
        if (localStorage.getItem("isLoggedIn") === "true") document.getElementById('auth-modal').style.display = 'none';
    </script>

    <!-- With this -->
    <script src="../public/assets/js/auth.js"></script>
    <script>
        if (localStorage.getItem("isLoggedIn") === "true") {
            document.getElementById('auth-modal').style.display = 'none';
        }
        if (localStorage.getItem("aurum_role") === "admin") {
            window.location.href = '../pages/admin/dashboard.html';
        }
    </script>
