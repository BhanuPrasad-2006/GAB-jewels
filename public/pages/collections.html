<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | GAB Jewels</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="top-nav">
        <div class="brand"><i class="fas fa-gem"></i> GAB Jewels</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="collections.html" class="active">Collections</a>
            <a href="settings.html">My Account</a>
            <a href="cart.html" class="cart-icon">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="badge">0</span>
            </a>
        </nav>
    </header>

    <main class="collections-container">
        <div class="header-text">
            <h2>Our Departments</h2>
            <p>Select a department to enter its dedicated gallery.</p>
        </div>

        <div class="grid-layout">
            <a href="../pages/womens-collection.html" class="collection-card">
                <img src="https://images.unsplash.com/photo-1515562141207-7a8efd3e35a1?auto=format&fit=crop&w=800&q=80"
                    alt="Women's Jewelry">
                <div class="card-overlay">
                    <h3>Women</h3>
                    <span class="shop-link">Enter Gallery <i class="fas fa-arrow-right"></i></span>
                </div>
            </a>

            <a href="../pages/mens-collection.html" class="collection-card">
                <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=800&q=80"
                    alt="Men's Jewelry">
                <div class="card-overlay">
                    <h3>Men</h3>
                    <span class="shop-link">Enter Gallery <i class="fas fa-arrow-right"></i></span>
                </div>
            </a>

            <a href="../pages/kids-collection.html" class="collection-card">
                <img src="https://images.unsplash.com/photo-1602752250019-3507e155b9e0?auto=format&fit=crop&w=800&q=80"
                    alt="Kids' Jewelry">
                <div class="card-overlay">
                    <h3>Kids</h3>
                    <span class="shop-link">Enter Gallery <i class="fas fa-arrow-right"></i></span>
                </div>
            </a>
        </div>
    </main>
    <script src="assets/js/cart.js"></script>
</body>

</html>
