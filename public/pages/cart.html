<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Bag | GAB Jewels</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <div class="brand"><i class="fas fa-gem"></i> GAB Jewels</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="collections.html">Collections</a>
            <a href="settings.html">My Account</a>
            <a href="cart.html" class="active cart-icon">
                <i class="fas fa-shopping-bag"></i> 
                <span id="cart-badge" class="badge">0</span>
            </a>
        </nav>
    </header>

    <div class="header-text">
        <h1>Your Shopping Bag</h1>
        <p>Review your selected masterpieces.</p>
    </div>

    <main class="cart-layout">
        
        <section class="cart-items-section">
            
            <div id="empty-cart-message" class="empty-state" style="display: none;">
                <h2>Your bag is empty</h2>
                <p>Discover our collections to find your perfect piece.</p>
                <a href="collections.html" class="btn-primary" style="display: inline-block; width: auto; padding: 15px 30px;">Explore Boutiques</a>
            </div>
            
            <div id="cart-items-container">
                </div>
        </section>

        <aside class="order-summary" id="order-summary-card">
            <h3>Order Summary</h3>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="summary-subtotal">₹ 0</span>
            </div>
            <div class="summary-row">
                <span>Secure Shipping</span>
                <span>Complimentary</span>
            </div>
            <hr>
            <div class="summary-row total-row">
                <span>Total</span>
                <span id="summary-total">₹ 0</span>
            </div>
            <button class="btn-primary">Proceed to Checkout</button>
        </aside>

    </main>

    <script src="assets/js/cart.js"></script>
    <script src="assets/js/cart-page.js"></script>
</body>
</html>
