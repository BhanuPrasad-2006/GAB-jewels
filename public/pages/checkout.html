<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | GAB Jewels</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="top-nav">
        <a href="index.html" class="brand"><i class="fas fa-gem"></i> GAB Jewels</a>
    </header>

    <main class="checkout-page">
        <div class="checkout-steps">
            <div class="step done">
                <div class="step-num">1</div> <span>Bag</span>
            </div>
            <div class="step-connector"></div>
            <div class="step active">
                <div class="step-num">2</div> <span>Checkout</span>
            </div>
            <div class="step-connector"></div>
            <div class="step">
                <div class="step-num">3</div> <span>Confirmation</span>
            </div>
        </div>

        <div class="checkout-layout">
            <form id="checkout-form" class="checkout-form-col">

                <section class="form-section">
                    <h2 class="form-section-title"><i class="fas fa-truck"></i> Shipping Address</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-input" placeholder="Arjun" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-input" placeholder="Sharma" required>
                        </div>
                    </div>
                    <div class="form-row full">
                        <div class="form-group">
                            <label class="form-label">Street Address</label>
                            <input type="text" class="form-input" placeholder="Flat No, Building, Street" required>
                        </div>
                    </div>
                    <div class="form-row thirds">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" class="form-input" placeholder="Mumbai" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">State</label>
                            <input type="text" class="form-input" placeholder="MH" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">PIN Code</label>
                            <input type="text" class="form-input" placeholder="400001" required>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h2 class="form-section-title"><i class="fas fa-credit-card"></i> Payment Method</h2>
                    <div class="payment-tabs">
                        <button type="button" class="payment-tab active"><i class="fas fa-card-alt"></i> Credit/Debit
                            Card</button>
                        <button type="button" class="payment-tab"><i class="fas fa-university"></i> Net Banking</button>
                        <button type="button" class="payment-tab"><i class="fas fa-wallet"></i> UPI</button>
                    </div>

                    <div class="form-row full">
                        <div class="form-group card-input-wrapper">
                            <label class="form-label">Card Number</label>
                            <input type="text" class="form-input" placeholder="0000 0000 0000 0000" required>
                            <i class="fab fa-cc-visa card-type-icon"></i>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Expiry (MM/YY)</label>
                            <input type="text" class="form-input" placeholder="12/28" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">CVV</label>
                            <input type="password" class="form-input" placeholder="***" required>
                        </div>
                    </div>
                    <div class="secure-note">
                        <i class="fas fa-lock"></i> Your payment information is encrypted and secure.
                    </div>
                </section>

                <button type="submit" class="btn-place-order">
                    Complete Purchase <i class="fas fa-check-circle"></i>
                </button>
                <a href="cart.html" class="back-to-cart"><i class="fas fa-arrow-left"></i> Return to Shopping Bag</a>
            </form>

            <aside class="order-summary">
                <h3>Your Order</h3>
                <div id="checkout-items-list">
                </div>
                <div class="summary-divider"></div>
                <div class="summary-total">
                    <span class="label">Total Amount</span>
                    <span class="amount" id="checkout-total">₹ 0</span>
                </div>
            </aside>
        </div>
    </main>

    <script src="../assets/js/cart.js"></script>
    <script>
        // Simple Logic for Checkout Page
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('checkout-items-list');
            const totalEl = document.getElementById('checkout-total');
            const localCart = JSON.parse(localStorage.getItem('gab_cart')) || [];

            let total = 0;
            localCart.forEach(item => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'summary-line';
                div.innerHTML = `<span>${item.title}</span> <span>₹${item.price.toLocaleString('en-IN')}</span>`;
                list.appendChild(div);
            });

            totalEl.innerText = new Intl.NumberFormat('en-IN', {
                style: 'currency', currency: 'INR', maximumFractionDigits: 0
            }).format(total);

            // Handle Form Submission
            document.getElementById('checkout-form').addEventListener('submit', (e) => {
                e.preventDefault();

                // 1. Grab the current cart
                const currentCart = localStorage.getItem('gab_cart');

                // 2. Save it as the 'last_order' so the confirmation page can see it
                localStorage.setItem('last_order', currentCart);

                // 3. NOW clear the shopping bag
                localStorage.removeItem('gab_cart');

                // 4. Redirect
                window.location.href = 'conformation.html';
            });
        });
    </script>
</body>

</html>
