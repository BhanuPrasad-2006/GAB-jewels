<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Details | GAB Jewels</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="top-nav">
        <div class="brand"><i class="fas fa-gem"></i> GAB Jewels</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="collections.html" class="active">Collections</a>
            <a href="settings.html">My Account</a>
            <a href="cart.html" class="cart-icon">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="badge">0</span>
            </a>
        </nav>
    </header>

    <main class="product-detail-container">
        <div class="product-gallery">
            <img id="main-image" src="" alt="Product Image">
            <div class="thumbnail-row">
                <img class="thumb active" id="thumb-1" src="">
                <img class="thumb" id="thumb-2" src="">
            </div>
        </div>

        <div class="product-info-large">
            <span class="purity-tag" id="detail-purity">Loading...</span>
            <h1 id="detail-title">Loading...</h1>
            <p class="price" id="detail-price">₹ 0</p>

            <div class="description">
                <h3>Description</h3>
                <p id="detail-desc">A masterpiece of craftsmanship, designed to elevate your everyday elegance. This
                    piece is certified authentic.</p>
            </div>

            <button id="btn-add-to-cart" class="btn-primary">Add to Shopping Bag</button>
        </div>
    </main>

    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/product-detail.js"></script>
</body>

</html>
