<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | GAB Jewels</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <a href="index.html" class="brand"><i class="fas fa-gem"></i> GAB Jewels</a>
    </header>

    <main class="order-confirmed">
        <div class="checkout-steps">
            <div class="step done"><div class="step-num">1</div> <span>Bag</span></div>
            <div class="step-connector"></div>
            <div class="step done"><div class="step-num">2</div> <span>Checkout</span></div>
            <div class="step-connector"></div>
            <div class="step active"><div class="step-num">3</div> <span>Confirmation</span></div>
        </div>

        <div class="confirmed-icon">
            <i class="fas fa-check"></i>
        </div>

        <h1>Thank you for your order</h1>
        <p>Your masterpiece is being prepared for shipment. A confirmation email with tracking details has been sent to you.</p>
        
        <div class="confirmed-order-num">
            Order Reference: <strong id="order-id">#GAB-000000</strong>
        </div>

        <div class="order-summary-box">
            <div id="confirmed-items-list">
                </div>
        </div>

        <div class="confirmed-actions">
            <a href="collections.html" class="btn-primary">Continue Shopping</a>
            <a href="index.html" class="btn-secondary" style="border: 1px solid var(--dark); color: var(--dark);">Go to Home</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Generate a random Order ID for the "luxury" feel
            const randomID = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('order-id').innerText = `#GAB-${randomID}`;

            // 2. Retrieve the order data we saved JUST before clearing the cart
            // (Note: In your checkout form, we should save the cart to 'last_order' before clearing it)
            const lastOrder = JSON.parse(localStorage.getItem('last_order')) || [];
            const container = document.getElementById('confirmed-items-list');

            if (lastOrder.length === 0) {
                container.innerHTML = "<p style='padding:20px;'>Order details unavailable.</p>";
                return;
            }

            lastOrder.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'confirmed-item';
                itemDiv.innerHTML = `
                    <img src="${item.img}" alt="${item.title}" class="confirmed-item-img">
                    <div class="confirmed-item-name">${item.title}</div>
                    <div class="confirmed-item-price">₹${item.price.toLocaleString('en-IN')}</div>
                `;
                container.appendChild(itemDiv);
            });

            // Clean up the 'last_order' after displaying it
            localStorage.removeItem('last_order');
        });
    </script>
</body>
</html>
